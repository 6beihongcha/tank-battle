<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - Tank Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', 'Microsoft YaHei', monospace;
            overflow: hidden;
            user-select: none;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 900px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .player1-avatar {
            background: rgba(46, 204, 113, 0.3);
            border: 2px solid #2ecc71;
        }

        .player2-avatar {
            background: rgba(231, 76, 60, 0.3);
            border: 2px solid #e74c3c;
        }

        .player-name {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }

        .player-score {
            color: #f1c40f;
            font-size: 28px;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }

        .vs-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 20px;
            font-weight: bold;
        }

        .game-timer {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            min-width: 80px;
            text-align: center;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 80px rgba(52, 152, 219, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: #2c3e50;
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 900px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }

        .controls {
            display: flex;
            gap: 40px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-title {
            font-weight: bold;
            font-size: 14px;
        }

        .control-keys {
            font-size: 12px;
            opacity: 0.8;
        }

        .p1-color {
            color: #2ecc71;
        }

        .p2-color {
            color: #e74c3c;
        }

        .btn {
            padding: 10px 24px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay-content {
            background: #1a1a2e;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: #fff;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
        }

        .overlay-content h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-content h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
        }

        .overlay-content .winner {
            font-size: 32px;
            margin-bottom: 30px;
        }

        .countdown {
            font-size: 80px;
            font-weight: bold;
            color: #f1c40f;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <!-- 顶部信息栏 -->
        <div class="game-header">
            <div class="player-info">
                <div class="player-avatar player1-avatar">🟢</div>
                <span class="player-name p1-color">玩家1</span>
                <span class="player-score p1-color" id="score1">0</span>
            </div>
            <div class="vs-text">⚔️ VS ⚔️</div>
            <div class="game-timer" id="timer">90</div>
            <div class="vs-text">⚔️</div>
            <div class="player-info">
                <span class="player-score p2-color" id="score2">0</span>
                <span class="player-name p2-color">玩家2</span>
                <div class="player-avatar player2-avatar">🔴</div>
            </div>
        </div>

        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="900" height="600"></canvas>

        <!-- 底部控制说明 -->
        <div class="game-footer">
            <div class="controls">
                <div class="control-group">
                    <span class="control-title p1-color">🟢 玩家1</span>
                    <span class="control-keys">移动: W A S D | 射击: F / G</span>
                </div>
                <div class="control-group">
                    <span class="control-title p2-color">🔴 玩家2</span>
                    <span class="control-keys">移动: ↑ ← ↓ → | 射击: / 或 .</span>
                </div>
            </div>
            <button class="btn" id="restartBtn" onclick="restartGame()">🔄 重新开始</button>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-overlay hidden" id="gameOverlay">
        <div class="overlay-content" id="overlayContent">
        </div>
    </div>

    <!-- 开始倒计时弹窗 -->
    <div class="game-overlay" id="startOverlay">
        <div class="overlay-content">
            <h1>🎮 坦克大战</h1>
            <h2>TANK BATTLE</h2>
            <p style="color: rgba(255,255,255,0.7); margin-bottom: 30px;">
                率先摧毁对方坦克3次即可获胜！
            </p>
            <div class="countdown" id="countdownText">3</div>
            <p style="color: rgba(255,255,255,0.5); margin-top: 20px;">准备战斗...</p>
        </div>
    </div>

    <script>
        // ==================== 游戏常量 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const W = canvas.width;
        const H = canvas.height;

        const TANK_SIZE = 36;
        const TANK_SPEED = 2.5;
        const TANK_ROTATION_SPEED = 0.045;
        const BULLET_SPEED = 6;
        const BULLET_COOLDOWN = 500; // ms
        const BULLET_LIFETIME = 2000; // ms
        const RESPAWN_INVINCIBLE = 3000; // ms
        const WIN_SCORE = 3;
        const GAME_DURATION = 90; // 秒

        // ==================== 游戏状态 ====================
        let gameRunning = false;
        let gamePaused = false;
        let scores = [0, 0];
        let gameTime = GAME_DURATION;
        let timerInterval = null;
        let keys = {};
        let particles = [];
        let powerUps = [];
        let powerUpTimer = 0;

        // ==================== 地图障碍物 ====================
        const walls = [
            // 边界
            { x: 0, y: 0, w: W, h: 10 },           // 上
            { x: 0, y: H - 10, w: W, h: 10 },       // 下
            { x: 0, y: 0, w: 10, h: H },            // 左
            { x: W - 10, y: 0, w: 10, h: H },       // 右

            // 中央区域障碍
            { x: W / 2 - 60, y: H / 2 - 80, w: 120, h: 20 },
            { x: W / 2 - 60, y: H / 2 + 60, w: 120, h: 20 },
            { x: W / 2 - 10, y: H / 2 - 80, w: 20, h: 160 },

            // 左上区域
            { x: 150, y: 120, w: 80, h: 15 },
            { x: 150, y: 120, w: 15, h: 60 },
            { x: 150, y: 280, w: 80, h: 15 },

            // 右上区域
            { x: W - 230, y: 120, w: 80, h: 15 },
            { x: W - 165, y: 120, w: 15, h: 60 },
            { x: W - 230, y: 280, w: 80, h: 15 },

            // 左下区域
            { x: 150, y: H - 135, w: 80, h: 15 },
            { x: 150, y: H - 210, w: 80, h: 15 },

            // 右下区域
            { x: W - 230, y: H - 135, w: 80, h: 15 },
            { x: W - 230, y: H - 210, w: 80, h: 15 },

            // 额外掩体
            { x: 80, y: 200, w: 40, h: 12 },
            { x: W - 120, y: 200, w: 40, h: 12 },
            { x: 80, y: H - 212, w: 40, h: 12 },
            { x: W - 120, y: H - 212, w: 40, h: 12 },
        ];

        // 可破坏的砖块
        let bricks = [
            { x: 300, y: 150, w: 25, h: 25, hp: 2 },
            { x: 340, y: 150, w: 25, h: 25, hp: 2 },
            { x: 380, y: 150, w: 25, h: 25, hp: 2 },
            { x: 420, y: 150, w: 25, h: 25, hp: 2 },
            { x: 460, y: 150, w: 25, h: 25, hp: 2 },
            { x: 500, y: 150, w: 25, h: 25, hp: 2 },
            { x: 540, y: 150, w: 25, h: 25, hp: 2 },
            { x: 580, y: 150, w: 25, h: 25, hp: 2 },

            { x: 300, y: H - 175, w: 25, h: 25, hp: 2 },
            { x: 340, y: H - 175, w: 25, h: 25, hp: 2 },
            { x: 380, y: H - 175, w: 25, h: 25, hp: 2 },
            { x: 420, y: H - 175, w: 25, h: 25, hp: 2 },
            { x: 460, y: H - 175, w: 25, h: 25, hp: 2 },
            { x: 500, y: H - 175, w: 25, h: 25, hp: 2 },
            { x: 540, y: H - 175, w: 25, h: 25, hp: 2 },
            { x: 580, y: H - 175, w: 25, h: 25, hp: 2 },
        ];

        // ==================== 坦克类 ====================
        class Tank {
            constructor(x, y, angle, color, playerNum) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.color = color;
                this.playerNum = playerNum;
                this.speed = 0;
                this.rotation = 0;
                this.alive = true;
                this.respawnTimer = 0;
                this.shootCooldown = 0;
                this.bullets = [];
                this.hp = 1;
                this.spawnX = x;
                this.spawnY = y;
                this.spawnAngle = angle;
                this.invincible = 0; // 无敌时间
                this.tracks = 0; // 履带动画
            }

            update() {
                if (!this.alive) {
                    this.respawnTimer--;
                    if (this.respawnTimer <= 0) {
                        this.respawn();
                    }
                    return;
                }

                // 无敌时间倒计时
                if (this.invincible > 0) {
                    this.invincible--;
                }

                // 射击冷却
                if (this.shootCooldown > 0) {
                    this.shootCooldown--;
                }

                // 旋转
                if (this.rotation !== 0) {
                    this.angle += this.rotation * TANK_ROTATION_SPEED;
                    this.tracks += Math.abs(this.rotation) * 0.3;
                }

                // 移动
                if (this.speed !== 0) {
                    const newX = this.x + Math.cos(this.angle) * this.speed;
                    const newY = this.y + Math.sin(this.angle) * this.speed;
                    this.tracks += Math.abs(this.speed) * 0.2;

                    // 碰撞检测 - 墙壁
                    let canMove = true;
                    const tankRect = {
                        x: newX - TANK_SIZE / 2,
                        y: newY - TANK_SIZE / 2,
                        w: TANK_SIZE,
                        h: TANK_SIZE
                    };

                    for (const wall of walls) {
                        if (rectCollide(tankRect, wall)) {
                            canMove = false;
                            break;
                        }
                    }

                    // 碰撞检测 - 砖块
                    for (const brick of bricks) {
                        if (rectCollide(tankRect, brick)) {
                            canMove = false;
                            break;
                        }
                    }

                    // 碰撞检测 - 另一辆坦克
                    const otherTank = this.playerNum === 1 ? tank2 : tank1;
                    if (otherTank.alive) {
                        const otherRect = {
                            x: otherTank.x - TANK_SIZE / 2,
                            y: otherTank.y - TANK_SIZE / 2,
                            w: TANK_SIZE,
                            h: TANK_SIZE
                        };
                        if (rectCollide(tankRect, otherRect)) {
                            canMove = false;
                        }
                    }

                    if (canMove) {
                        this.x = newX;
                        this.y = newY;
                    }
                }

                // 更新子弹
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const bullet = this.bullets[i];
                    bullet.x += Math.cos(bullet.angle) * BULLET_SPEED;
                    bullet.y += Math.sin(bullet.angle) * BULLET_SPEED;
                    bullet.life--;

                    // 子弹超出边界
                    if (bullet.x < 0 || bullet.x > W || bullet.y < 0 || bullet.y > H || bullet.life <= 0) {
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    // 子弹撞墙
                    let hitWall = false;
                    for (const wall of walls) {
                        if (pointInRect(bullet.x, bullet.y, wall)) {
                            hitWall = true;
                            createSparkParticles(bullet.x, bullet.y, 5, '#fff');
                            break;
                        }
                    }
                    if (hitWall) {
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    // 子弹撞砖块
                    let hitBrick = false;
                    for (let j = bricks.length - 1; j >= 0; j--) {
                        if (pointInRect(bullet.x, bullet.y, bricks[j])) {
                            bricks[j].hp--;
                            createSparkParticles(bullet.x, bullet.y, 8, '#f39c12');
                            if (bricks[j].hp <= 0) {
                                createExplosionParticles(bricks[j].x + bricks[j].w / 2, bricks[j].y + bricks[j].h / 2, 15, '#e67e22');
                                bricks.splice(j, 1);
                            }
                            hitBrick = true;
                            break;
                        }
                    }
                    if (hitBrick) {
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    // 子弹击中对方坦克
                    const otherTank = this.playerNum === 1 ? tank2 : tank1;
                    if (otherTank.alive && otherTank.invincible <= 0) {
                        const otherRect = {
                            x: otherTank.x - TANK_SIZE / 2,
                            y: otherTank.y - TANK_SIZE / 2,
                            w: TANK_SIZE,
                            h: TANK_SIZE
                        };
                        if (pointInRect(bullet.x, bullet.y, otherRect)) {
                            // 击中!
                            otherTank.destroy();
                            scores[this.playerNum - 1]++;
                            updateScoreDisplay();
                            createExplosionParticles(otherTank.x, otherTank.y, 30, otherTank.color);
                            this.bullets.splice(i, 1);

                            // 检查胜利条件
                            if (scores[this.playerNum - 1] >= WIN_SCORE) {
                                endGame(this.playerNum);
                            }
                            continue;
                        }
                    }
                }
            }

            shoot() {
                if (!this.alive || this.shootCooldown > 0) return;
                this.bullets.push({
                    x: this.x + Math.cos(this.angle) * (TANK_SIZE / 2 + 6),
                    y: this.y + Math.sin(this.angle) * (TANK_SIZE / 2 + 6),
                    angle: this.angle,
                    life: 120,
                    color: this.color
                });
                // 速射道具：冷却时间缩短为1/3
                this.shootCooldown = this._rapidFire > 0 ? Math.floor(BULLET_COOLDOWN / 3) : BULLET_COOLDOWN;
            }

            destroy() {
                this.alive = false;
                this.respawnTimer = 60; // 1秒后重生
                this.bullets = [];
                this.speed = 0;
                this.rotation = 0;
            }

            respawn() {
                // 在己方半场随机重生
                let rx, ry;
                let attempts = 0;
                do {
                    if (this.playerNum === 1) {
                        rx = 60 + Math.random() * (W / 2 - 120);
                    } else {
                        rx = W / 2 + 60 + Math.random() * (W / 2 - 120);
                    }
                    ry = 50 + Math.random() * (H - 100);
                    attempts++;
                } while (attempts < 100 && isPositionBlocked(rx, ry, this));

                this.x = rx;
                this.y = ry;
                this.angle = this.spawnAngle;
                this.alive = true;
                this.invincible = RESPAWN_INVINCIBLE;
                this.speed = 0;
                this.rotation = 0;
                this.bullets = [];
                this.shootCooldown = 0;
            }

            draw(ctx) {
                // 绘制子弹
                for (const bullet of this.bullets) {
                    ctx.save();
                    ctx.fillStyle = bullet.color;
                    ctx.shadowColor = bullet.color;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    // 子弹拖尾
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath();
                    ctx.arc(bullet.x - Math.cos(bullet.angle) * 4, bullet.y - Math.sin(bullet.angle) * 4, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                if (!this.alive) return;

                // 无敌闪烁效果
                if (this.invincible > 0 && Math.floor(this.invincible / 8) % 2 === 0) {
                    ctx.globalAlpha = 0.4;
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // 履带动画偏移
                const trackOffset = Math.sin(this.tracks) * 2;

                // 阴影
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                // 履带 (两侧)
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(-TANK_SIZE / 2 - 3, -TANK_SIZE / 2 + 2, 5, TANK_SIZE - 4);
                ctx.fillRect(TANK_SIZE / 2 - 2, -TANK_SIZE / 2 + 2, 5, TANK_SIZE - 4);

                // 履带纹理
                ctx.fillStyle = '#34495e';
                for (let i = -TANK_SIZE / 2 + 6; i < TANK_SIZE / 2 - 6; i += 5) {
                    ctx.fillRect(-TANK_SIZE / 2 - 2, i + trackOffset, 3, 2);
                    ctx.fillRect(TANK_SIZE / 2 - 1, i - trackOffset, 3, 2);
                }

                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;

                // 车身
                const bodyGrad = ctx.createLinearGradient(0, -TANK_SIZE / 2, 0, TANK_SIZE / 2);
                bodyGrad.addColorStop(0, this.color);
                bodyGrad.addColorStop(1, this.darkenColor(0.6));
                ctx.fillStyle = bodyGrad;
                ctx.fillRect(-TANK_SIZE / 2 + 3, -TANK_SIZE / 2 + 3, TANK_SIZE - 6, TANK_SIZE - 6);

                // 车身边框
                ctx.strokeStyle = this.darkenColor(0.4);
                ctx.lineWidth = 1.5;
                ctx.strokeRect(-TANK_SIZE / 2 + 3, -TANK_SIZE / 2 + 3, TANK_SIZE - 6, TANK_SIZE - 6);

                // 炮塔底座
                ctx.fillStyle = this.darkenColor(0.3);
                ctx.beginPath();
                ctx.arc(0, 0, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = this.darkenColor(0.2);
                ctx.lineWidth = 2;
                ctx.stroke();

                // 炮管
                const barrelGrad = ctx.createLinearGradient(0, -3, 0, 3);
                barrelGrad.addColorStop(0, this.lightenColor(0.3));
                barrelGrad.addColorStop(1, this.darkenColor(0.4));
                ctx.fillStyle = barrelGrad;
                ctx.fillRect(8, -3, TANK_SIZE / 2, 6);
                ctx.strokeStyle = this.darkenColor(0.2);
                ctx.lineWidth = 1;
                ctx.strokeRect(8, -3, TANK_SIZE / 2, 6);

                // 炮口
                ctx.fillStyle = this.darkenColor(0.5);
                ctx.fillRect(TANK_SIZE / 2 + 6, -4, 5, 8);

                ctx.restore();

                // 无敌护盾效果
                if (this.invincible > 0) {
                    ctx.save();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([6, 4]);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, TANK_SIZE / 2 + 6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                }

                ctx.globalAlpha = 1;

                // 生命值指示器
                if (this.alive) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(this.x - 15, this.y - TANK_SIZE / 2 - 16, 30, 5);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x - 15, this.y - TANK_SIZE / 2 - 16, 30, 5);
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(this.x - 15, this.y - TANK_SIZE / 2 - 16, 30, 5);
                }
            }

            darkenColor(amount) {
                const rgb = this.hexToRgb(this.color);
                return `rgb(${Math.floor(rgb.r * amount)}, ${Math.floor(rgb.g * amount)}, ${Math.floor(rgb.b * amount)})`;
            }

            lightenColor(amount) {
                const rgb = this.hexToRgb(this.color);
                return `rgb(${Math.min(255, Math.floor(rgb.r + (255 - rgb.r) * amount))}, ${Math.min(255, Math.floor(rgb.g + (255 - rgb.g) * amount))}, ${Math.min(255, Math.floor(rgb.b + (255 - rgb.b) * amount))})`;
            }

            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 0, g: 0, b: 0 };
            }
        }

        // ==================== 辅助函数 ====================
        function rectCollide(r1, r2) {
            return r1.x < r2.x + r2.w &&
                r1.x + r1.w > r2.x &&
                r1.y < r2.y + r2.h &&
                r1.y + r1.h > r2.y;
        }

        function pointInRect(px, py, rect) {
            return px >= rect.x && px <= rect.x + rect.w &&
                py >= rect.y && py <= rect.y + rect.h;
        }

        function isPositionBlocked(x, y, excludeTank) {
            const margin = 12;
            const rect = {
                x: x - TANK_SIZE / 2 - margin,
                y: y - TANK_SIZE / 2 - margin,
                w: TANK_SIZE + margin * 2,
                h: TANK_SIZE + margin * 2
            };
            for (const wall of walls) {
                if (rectCollide(rect, wall)) return true;
            }
            for (const brick of bricks) {
                if (rectCollide(rect, brick)) return true;
            }
            // 检查另一辆坦克的位置
            if (excludeTank) {
                const other = excludeTank === tank1 ? tank2 : tank1;
                if (other.alive) {
                    const otherRect = {
                        x: other.x - TANK_SIZE / 2 - margin,
                        y: other.y - TANK_SIZE / 2 - margin,
                        w: TANK_SIZE + margin * 2,
                        h: TANK_SIZE + margin * 2
                    };
                    if (rectCollide(rect, otherRect)) return true;
                }
            }
            return false;
        }

        function createExplosionParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 4;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 20 + Math.random() * 20,
                    maxLife: 40,
                    color: color,
                    size: 2 + Math.random() * 4
                });
            }
        }

        function createSparkParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.5 + Math.random() * 2;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 5 + Math.random() * 10,
                    maxLife: 15,
                    color: color,
                    size: 1 + Math.random() * 2
                });
            }
        }

        // ==================== 创建坦克 ====================
        let tank1 = new Tank(100, 80, Math.PI / 4, '#2ecc71', 1);
        let tank2 = new Tank(W - 100, H - 80, -Math.PI * 3 / 4, '#e74c3c', 2);

        // ==================== 粒子绘制 ====================
        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                const alpha = p.life / p.maxLife;
                ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                if (p.color.startsWith('#')) {
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ==================== 道具系统 ====================
        const POWERUP_TYPES = [
            { name: 'speed', color: '#3498db', icon: '⚡', duration: 300 },
            { name: 'rapid', color: '#f1c40f', icon: '🔥', duration: 240 },
            { name: 'shield', color: '#9b59b6', icon: '🛡️', duration: 300 },
        ];

        function spawnPowerUp() {
            if (powerUps.length >= 3) return;
            const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
            let x, y;
            do {
                x = 40 + Math.random() * (W - 80);
                y = 40 + Math.random() * (H - 80);
            } while (isPositionBlocked(x, y));
            powerUps.push({ x, y, type, life: 600 });
        }

        function updatePowerUps() {
            powerUpTimer--;
            if (powerUpTimer <= 0) {
                spawnPowerUp();
                powerUpTimer = 300 + Math.random() * 300;
            }

            for (let i = powerUps.length - 1; i >= 0; i--) {
                powerUps[i].life--;
                if (powerUps[i].life <= 0) {
                    powerUps.splice(i, 1);
                    continue;
                }

                const pu = powerUps[i];
                const puRect = { x: pu.x - 15, y: pu.y - 15, w: 30, h: 30 };

                // 检查坦克拾取
                for (const tank of [tank1, tank2]) {
                    if (!tank.alive) continue;
                    const tRect = {
                        x: tank.x - TANK_SIZE / 2,
                        y: tank.y - TANK_SIZE / 2,
                        w: TANK_SIZE,
                        h: TANK_SIZE
                    };
                    if (rectCollide(tRect, puRect)) {
                        applyPowerUp(tank, pu.type);
                        powerUps.splice(i, 1);
                        break;
                    }
                }
            }
        }

        function applyPowerUp(tank, type) {
            switch (type.name) {
                case 'speed':
                    tank._speedBoost = type.duration;
                    break;
                case 'rapid':
                    tank._rapidFire = type.duration;
                    break;
                case 'shield':
                    tank.invincible = type.duration;
                    break;
            }
            createSparkParticles(tank.x, tank.y, 15, type.color);
        }

        function drawPowerUps() {
            for (const pu of powerUps) {
                // 闪烁效果
                const flash = Math.sin(pu.life * 0.1) * 0.3 + 0.7;
                ctx.save();
                ctx.globalAlpha = flash;
                ctx.fillStyle = pu.type.color;
                ctx.shadowColor = pu.type.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(pu.x, pu.y, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(pu.type.icon, pu.x, pu.y);
                ctx.restore();
            }
        }

        // ==================== 绘制地图 ====================
        function drawMap() {
            // 背景网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let x = 0; x < W; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y < H; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // 墙壁
            for (const wall of walls) {
                // 主体
                const grad = ctx.createLinearGradient(wall.x, wall.y, wall.x, wall.y + wall.h);
                grad.addColorStop(0, '#7f8c8d');
                grad.addColorStop(0.5, '#95a5a6');
                grad.addColorStop(1, '#6c7a7b');
                ctx.fillStyle = grad;
                ctx.fillRect(wall.x, wall.y, wall.w, wall.h);

                // 边框
                ctx.strokeStyle = '#566573';
                ctx.lineWidth = 1;
                ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);

                // 高光
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(wall.x, wall.y, wall.w, 2);
            }

            // 砖块
            for (const brick of bricks) {
                const alpha = brick.hp === 1 ? 0.5 : 1;
                ctx.fillStyle = `rgba(185, 119, 14, ${alpha})`;
                ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
                ctx.strokeStyle = 'rgba(120, 70, 10, 0.8)';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(brick.x, brick.y, brick.w, brick.h);

                // 砖块纹理
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(brick.x, brick.y + brick.h / 2);
                ctx.lineTo(brick.x + brick.w, brick.y + brick.h / 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(brick.x + brick.w / 2, brick.y);
                ctx.lineTo(brick.x + brick.w / 2, brick.y + brick.h / 2);
                ctx.stroke();

                if (brick.hp === 1) {
                    ctx.strokeStyle = 'rgba(255,0,0,0.4)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(brick.x, brick.y);
                    ctx.lineTo(brick.x + brick.w, brick.y + brick.h);
                    ctx.moveTo(brick.x + brick.w, brick.y);
                    ctx.lineTo(brick.x, brick.y + brick.h);
                    ctx.stroke();
                }
            }

            // 半场分界线
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 2;
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(W / 2, 10);
            ctx.lineTo(W / 2, H - 10);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // ==================== 游戏循环 ====================
        function update() {
            if (!gameRunning || gamePaused) return;

            // 更新坦克速度(考虑道具)
            const t1Speed = tank1._speedBoost > 0 ? TANK_SPEED * 1.6 : TANK_SPEED;
            const t2Speed = tank2._speedBoost > 0 ? TANK_SPEED * 1.6 : TANK_SPEED;

            // 玩家1 控制 (WASD + F)
            tank1.speed = 0;
            tank1.rotation = 0;
            if (keys['KeyW']) tank1.speed = t1Speed;
            if (keys['KeyS']) tank1.speed = -t1Speed;
            if (keys['KeyA']) tank1.rotation = -1;
            if (keys['KeyD']) tank1.rotation = 1;
            if (keys['KeyF'] || keys['KeyG']) tank1.shoot();

            // 玩家2 控制 (方向键 + / 或 .)
            tank2.speed = 0;
            tank2.rotation = 0;
            if (keys['ArrowUp']) tank2.speed = t2Speed;
            if (keys['ArrowDown']) tank2.speed = -t2Speed;
            if (keys['ArrowLeft']) tank2.rotation = -1;
            if (keys['ArrowRight']) tank2.rotation = 1;
            if (keys['Slash'] || keys['Period'] || keys['NumpadDivide'] || keys['NumpadDecimal']) tank2.shoot();

            // 道具效果计时
            if (tank1._speedBoost !== undefined) {
                tank1._speedBoost--;
                if (tank1._speedBoost <= 0) delete tank1._speedBoost;
            }
            if (tank1._rapidFire !== undefined) {
                tank1._rapidFire--;
                if (tank1._rapidFire <= 0) delete tank1._rapidFire;
            }
            if (tank2._speedBoost !== undefined) {
                tank2._speedBoost--;
                if (tank2._speedBoost <= 0) delete tank2._speedBoost;
            }
            if (tank2._rapidFire !== undefined) {
                tank2._rapidFire--;
                if (tank2._rapidFire <= 0) delete tank2._rapidFire;
            }

            tank1.update();
            tank2.update();
            updatePowerUps();
        }

        function drawHUD() {
            // 道具状态指示
            const tanks = [tank1, tank2];
            const tankNames = ['玩家1', '玩家2'];
            for (let i = 0; i < 2; i++) {
                const tank = tanks[i];
                let yOffset = tank.alive ? (i === 0 ? 40 : 40) : 0;
                let xBase = i === 0 ? 15 : W - 150;

                if (tank.alive) {
                    const buffs = [];
                    if (tank._speedBoost > 0) buffs.push({ icon: '⚡', name: '加速', remaining: tank._speedBoost });
                    if (tank._rapidFire > 0) buffs.push({ icon: '🔥', name: '速射', remaining: tank._rapidFire });
                    if (tank.invincible > 0 && tank.invincible < 300) buffs.push({ icon: '🛡️', name: '护盾', remaining: tank.invincible });

                    for (let j = 0; j < buffs.length; j++) {
                        const buff = buffs[j];
                        const bx = xBase;
                        const by = 20 + j * 25;
                        ctx.fillStyle = 'rgba(0,0,0,0.6)';
                        ctx.fillRect(bx, by, 130, 22);
                        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(bx, by, 130, 22);
                        ctx.fillStyle = '#fff';
                        ctx.font = '12px Arial';
                        ctx.textAlign = 'left';
                        ctx.fillText(`${buff.icon} ${buff.name} ${Math.ceil(buff.remaining / 60)}s`, bx + 5, by + 15);

                        // 进度条
                        const progress = buff.remaining / 300;
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(bx, by + 20, 130, 2);
                        ctx.fillStyle = tank.color;
                        ctx.fillRect(bx, by + 20, 130 * progress, 2);
                    }
                }
            }
        }

        function draw() {
            // 清除画布
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(0, 0, W, H);

            drawMap();
            drawPowerUps();

            // 绘制坦克
            tank1.draw(ctx);
            tank2.draw(ctx);

            updateAndDrawParticles();
            drawHUD();

            // 暂停提示
            if (gamePaused) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px "Microsoft YaHei", Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⏸ 已暂停', W / 2, H / 2);
                ctx.font = '18px "Microsoft YaHei", Arial';
                ctx.fillText('按 空格键 继续', W / 2, H / 2 + 40);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ==================== 计分与计时 ====================
        function updateScoreDisplay() {
            document.getElementById('score1').textContent = scores[0];
            document.getElementById('score2').textContent = scores[1];

            // 动画效果
            const el1 = document.getElementById('score1');
            const el2 = document.getElementById('score2');
            el1.style.transform = 'scale(1.3)';
            el2.style.transform = 'scale(1.3)';
            setTimeout(() => {
                el1.style.transform = 'scale(1)';
                el2.style.transform = 'scale(1)';
            }, 200);
        }

        function startTimer() {
            gameTime = GAME_DURATION;
            document.getElementById('timer').textContent = gameTime;
            timerInterval = setInterval(() => {
                gameTime--;
                document.getElementById('timer').textContent = gameTime;
                if (gameTime <= 10) {
                    document.getElementById('timer').style.color = '#e74c3c';
                }
                if (gameTime <= 0) {
                    endGameByTime();
                }
            }, 1000);
        }

        function endGame(winnerNum) {
            gameRunning = false;
            clearInterval(timerInterval);

            const winnerColor = winnerNum === 1 ? '#2ecc71' : '#e74c3c';
            const winnerName = winnerNum === 1 ? '玩家1 🟢' : '玩家2 🔴';
            const overlay = document.getElementById('gameOverlay');
            const content = document.getElementById('overlayContent');

            content.innerHTML = `
                <h1>🏆 游戏结束</h1>
                <div class="winner" style="color: ${winnerColor}">
                    ${winnerName} 获胜!
                </div>
                <p style="color: rgba(255,255,255,0.7); margin-bottom: 10px;">
                    最终比分: <span style="color:#2ecc71">${scores[0]}</span> - <span style="color:#e74c3c">${scores[1]}</span>
                </p>
                <p style="color: rgba(255,255,255,0.5); margin-bottom: 30px;">
                    剩余时间: ${gameTime} 秒
                </p>
                <button class="btn" onclick="restartGame()" style="font-size: 18px; padding: 14px 40px;">
                    🔄 再来一局
                </button>
            `;
            overlay.classList.remove('hidden');
        }

        function endGameByTime() {
            gameRunning = false;
            clearInterval(timerInterval);

            let winnerNum, winnerName, winnerColor;
            if (scores[0] > scores[1]) {
                winnerNum = 1;
                winnerName = '玩家1 🟢';
                winnerColor = '#2ecc71';
            } else if (scores[1] > scores[0]) {
                winnerNum = 2;
                winnerName = '玩家2 🔴';
                winnerColor = '#e74c3c';
            } else {
                winnerNum = 0;
                winnerName = '平局!';
                winnerColor = '#f1c40f';
            }

            const overlay = document.getElementById('gameOverlay');
            const content = document.getElementById('overlayContent');

            content.innerHTML = `
                <h1>⏰ 时间到!</h1>
                <div class="winner" style="color: ${winnerColor}">
                    ${winnerNum === 0 ? '🤝 平局!' : winnerName + ' 获胜!'}
                </div>
                <p style="color: rgba(255,255,255,0.7); margin-bottom: 30px;">
                    最终比分: <span style="color:#2ecc71">${scores[0]}</span> - <span style="color:#e74c3c">${scores[1]}</span>
                </p>
                <button class="btn" onclick="restartGame()" style="font-size: 18px; padding: 14px 40px;">
                    🔄 再来一局
                </button>
            `;
            overlay.classList.remove('hidden');
        }

        function restartGame() {
            scores = [0, 0];
            gameTime = GAME_DURATION;
            particles = [];
            powerUps = [];
            powerUpTimer = 300;
            bricks = bricks.map(b => ({ ...b, hp: 2 })); // 修复砖块

            tank1 = new Tank(100, 80, Math.PI / 4, '#2ecc71', 1);
            tank2 = new Tank(W - 100, H - 80, -Math.PI * 3 / 4, '#e74c3c', 2);

            updateScoreDisplay();
            document.getElementById('timer').textContent = gameTime;
            document.getElementById('timer').style.color = '#fff';
            document.getElementById('gameOverlay').classList.add('hidden');

            clearInterval(timerInterval);
            startCountdown();
        }

        function startCountdown() {
            gameRunning = false;
            const overlay = document.getElementById('startOverlay');
            const countdownText = document.getElementById('countdownText');
            overlay.classList.remove('hidden');

            let count = 3;
            countdownText.textContent = count;
            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownText.textContent = count;
                    countdownText.style.animation = 'none';
                    countdownText.offsetHeight;
                    countdownText.style.animation = 'pulse 0.5s ease-in-out';
                } else if (count === 0) {
                    countdownText.textContent = 'GO!';
                    countdownText.style.color = '#2ecc71';
                    countdownText.style.animation = 'none';
                    countdownText.offsetHeight;
                    countdownText.style.animation = 'pulse 0.5s ease-in-out';
                } else {
                    clearInterval(countInterval);
                    overlay.classList.add('hidden');
                    countdownText.style.color = '#f1c40f';
                    gameRunning = true;
                    startTimer();
                }
            }, 800);
        }

        // ==================== 键盘事件 ====================
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            // 防止方向键滚动页面
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }

            // 暂停
            if (e.code === 'Space' && gameRunning) {
                gamePaused = !gamePaused;
            }

            // 按R重新开始
            if (e.code === 'KeyR' && !gameRunning) {
                restartGame();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // ==================== 初始化 ====================
        updateScoreDisplay();
        document.getElementById('timer').textContent = gameTime;

        // 开始游戏
        gameLoop();
        startCountdown();
    </script>
</body>
</html>
